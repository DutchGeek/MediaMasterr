services:
  mediamasterr:
    image: ghcr.io/dutchgeek/mediamasterr:latest
    pull_policy: always
    container_name: mediamasterr
    restart: unless-stopped
    env_file: ".env"
    environment:
      DATA_DIR: /config
    volumes:
      # persist app data
      - ./data:/config

      # bind mount for media files (adjust the host path as needed) - this is needed for
      # MediaMasterr to clean up additional files on delete when deleting via the main media server
      # directly
      - /media:/media

      # optional volume for moved files (adjust the host path as needed)
      # - /moved_files:/moved_files
    ports:
      - "8000:8000"

    # optional LinuxServer container style runtime controls for UnRaid/NAS users:
    # set PUID/PGID/UMASK/TZ in your .env file, for example:
    # PUID=1000
    # PGID=1000
    # UMASK=022
    # TZ=America/New_York

    # optional healthcheck to monitor container health (adjust the URL and parameters as needed)
    # healthcheck:
    #   test: ["CMD", "curl", "-sf", "http://localhost:8000/api/info/health"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 5
    #   start_period: 20s
