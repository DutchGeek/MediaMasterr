name: Docker Build

on:
  push:
    branches:
      - main
    tags:
      - "[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to push (e.g. 0.1.0-beta1)"
        required: true
        type: string
      ref:
        description: "Branch or commit to build from (e.g. dev)"
        required: false
        default: dev
        type: string
      app_channel:
        description: "Frontend channel (dev or release)"
        required: false
        default: dev
        type: choice
        options:
          - dev
          - release

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/mediamasterr

jobs:
  build-and-push:
    name: Build & push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short,prefix=
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}

      - name: Prepare build metadata
        id: buildmeta
        shell: bash
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          VERSION="${{ steps.meta.outputs.version }}"
          if [[ -z "$VERSION" ]]; then
            VERSION="${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve frontend channel
        id: channel
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "value=release" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.app_channel || 'dev' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: api
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_APP_CHANNEL=${{ steps.channel.outputs.value }}
            BUILD_VERSION=${{ steps.buildmeta.outputs.version }}
            BUILD_COMMIT_SHA=${{ steps.buildmeta.outputs.short_sha }}
            BUILD_TIMESTAMP=${{ steps.buildmeta.outputs.timestamp }}
            BUILD_REPOSITORY=https://github.com/${{ github.repository }}
            BUILD_DOCKER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            BUILD_CONTAINER_DIGEST=unknown
          cache-from: type=gha
          cache-to: type=gha,mode=max
